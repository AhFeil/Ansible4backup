---
- name: Login to Container Registry
  containers.podman.podman_login:
    registry: "{{ image_registry.split('/')[0] }}"
    username: "{{ image_registry_user }}"
    password: "{{ image_registry_token }}"

- name: Get current image ID before pull
  ansible.builtin.command:
    cmd: "podman image inspect {{ image_registry }}:{{ version }} --format '{% raw %}{{.Id}}{% endraw %}'"
  register: _image_before
  ignore_errors: true
  changed_when: false

- name: Pull todo web image
  ansible.builtin.command:
    cmd: "podman pull {{ image_registry }}:{{ version }}"
  changed_when: false

- name: Get current image ID after pull
  ansible.builtin.command:
    cmd: "podman image inspect {{ image_registry }}:{{ version }} --format '{% raw %}{{.Id}}{% endraw %}'"
  register: _image_after
  changed_when: false

- name: Set image updated fact
  ansible.builtin.set_fact:
    _image_updated: "{{ _image_before.stdout | default('') != _image_after.stdout }}"

- name: Stop, reload, and restart todo web service
  when: _image_updated | bool
  block:
    - name: Stop todo web beat service
      ansible.builtin.systemd:
        name: todo_beat
        state: stopped
        scope: user

    - name: Stop todo web service
      ansible.builtin.systemd:
        name: todo_web
        state: stopped
        scope: user

    - name: Stop todo web worker service
      ansible.builtin.systemd:
        name: todo_worker
        state: stopped
        scope: user

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true
        scope: user

    - name: Start todo web worker service
      ansible.builtin.systemd:
        name: todo_worker
        state: started
        scope: user

    - name: Start todo web service
      ansible.builtin.systemd:
        name: todo_web
        state: started
        scope: user

    - name: Start todo web beat service
      ansible.builtin.systemd:
        name: todo_beat
        state: started
        scope: user

    - name: Wait for container to be ready
      ansible.builtin.pause:
        seconds: 3

- name: Copy static and assets files from container
  when: _image_updated | bool
  block:
    - name: Copy static directory from container
      ansible.builtin.command:
        cmd: "podman cp todo_web:/app/services/web/static {{ ansible_facts.env.HOME }}/todo/web/"
      changed_when: true
