---
- name: Login to Container Registry
  containers.podman.podman_login:
    registry: "{{ image_registry.split('/')[0] }}"
    username: "{{ image_registry_user }}"
    password: "{{ image_registry_token }}"

- name: Check if ptd sync image exists locally
  ansible.builtin.command:
    cmd: "podman image exists {{ image_registry }}:{{ version }}"
  register: _image_exists
  failed_when: false
  changed_when: false

- name: Pull ptd sync image
  ansible.builtin.command:
    cmd: "podman pull {{ image_registry }}:{{ version }}"
  when: _image_exists.rc != 0
  changed_when: true

- name: Update version in service file
  ansible.builtin.replace:
    path: "{{ ansible_facts.env.HOME }}/ptd_sync/sync/container-plantodo_sync.service"
    regexp: '({{ image_registry | regex_escape }}:)\S+'
    replace: '\g<1>{{ version }}'
  register: _service_updated

- name: Stop, reload, and restart ptd sync service
  when: _service_updated is changed
  block:
    - name: Send close-all events request before stopping
      ansible.builtin.uri:
        url: "http://127.0.0.1:25842/v1/events/close-all"
        method: POST
        headers:
          Authorization: "Bearer {{ admin_token }}"
      failed_when: false

    - name: Stop ptd sync service
      ansible.builtin.systemd:
        name: container-plantodo_sync
        state: stopped
        scope: user

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true
        scope: user

    - name: Start ptd sync service
      ansible.builtin.systemd:
        name: container-plantodo_sync
        state: started
        scope: user

    - name: Wait for container to be ready
      ansible.builtin.pause:
        seconds: 3
